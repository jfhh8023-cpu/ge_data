# DevTracker Nginx location block
# Add this to /etc/nginx/conf.d/notification-system.conf (inside the server block)
# Place BEFORE the catch-all "location / {" block

    # === DevTracker 工时统计系统 ===
    # 前端静态文件
    location /devtracker/ {
        alias /opt/devtracker/frontend/dist/;
        index index.html;
        try_files $uri $uri/ /devtracker/index.html;
    }

    # 后端 API 代理
    location /devtracker/api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
