server {
    listen 80;
    server_name jfzhu8023.cloud 43.138.150.37 localhost "";

    client_max_body_size 200M;

    # ========== DevTracker ==========
    # 后端 API 代理到 3001
    location /devtracker/api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
    }

    # 前端 SPA（Vue Router history 模式，base=/devtracker/）
    location /devtracker/ {
        alias /opt/devtracker/frontend/dist/;
        index index.html;
        try_files $uri $uri/ /devtracker/index.html;
    }

    # ========== Notification System (保留原配置) ==========
    location / {
        proxy_pass http://127.0.0.1:8900;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE Stream settings
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
    }
}
